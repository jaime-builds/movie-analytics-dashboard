services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - config/.env
    volumes:
      # Persist the SQLite database across container restarts
      - ./movies.db:/app/movies.db
      # Persist logs across container restarts
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
